name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: py${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.11", "3.12"]
    env:
      # Provide test secrets that pass validation.
      DEEPSEC_SECRET_KEY: ${{ secrets.DEEPSEC_SECRET_KEY || '0123456789abcdef0123456789abcdef' }}
      DEEPSEC_JWT_SECRET: ${{ secrets.DEEPSEC_JWT_SECRET || 'fedcba9876543210fedcba9876543210' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check deepsecurity tests

      - name: Format check
        run: ruff format --check deepsecurity tests

      - name: Type-check
        run: mypy deepsecurity || true  # start as advisory; flip to fail-fast once clean

      - name: Test
        run: pytest --cov=deepsecurity --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage.xml
          path: coverage.xml
          retention-days: 7

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: deepsecurity:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install + audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt --strict || true
